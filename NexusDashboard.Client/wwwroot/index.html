<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Dashboard</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0b0e14;color:#5a6280;font-family:'DM Sans',sans-serif;flex-direction:column;gap:1rem;">
            <div style="width:36px;height:36px;border:3px solid #1e2538;border-top-color:#00E5BE;border-radius:50%;animation:spin .8s linear infinite;"></div>
            <span style="font-size:.9rem;">Loading Nexus…</span>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        #blazor-error-ui { display:none; position:fixed; bottom:0; left:0; right:0; background:#ff6b6b; color:#fff; padding:1rem 2rem; font-family:sans-serif; z-index:9999; }
        #blazor-error-ui a { color:#fff; }
    </style>
</body>
</html>
